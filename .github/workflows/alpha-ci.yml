name: alpha CI

# Builds and runs unit tests on the ekryski fork's `alpha` branch and any PR
# targeting it. Skips Tests/Benchmarks (slow, requires HF model downloads).
#
# This workflow is fork-only — gated on the repository owner — so it doesn't
# fire if the fork is upstreamed back into ml-explore. The upstream's own
# `pull_request.yml` runs on self-hosted runners and is gated on its own repo.

on:
  push:
    branches: [alpha]
  pull_request:
    branches: [alpha]

permissions:
  contents: read

concurrency:
  group: alpha-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/alpha' }}

jobs:
  build_and_test:
    if: github.repository_owner == 'ekryski'
    name: Build and unit-test (M1 macOS)
    runs-on: macos-26
    timeout-minutes: 45
    defaults:
      run:
        # All run steps execute from the mlx-swift-lm checkout. The
        # sibling mlx-swift checkout lives at ../mlx-swift to match
        # Package.swift's `.package(path: "../mlx-swift")` local dep.
        working-directory: mlx-swift-lm
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          path: mlx-swift-lm

      - name: Checkout ekryski/mlx-swift (Package.swift sibling)
        # Package.swift uses a `.package(path: "../mlx-swift")` local dep for
        # spec-020's cross-repo native kernel work. The CI runner needs the
        # matching ref of mlx-swift checked out as a sibling. Pinned to
        # `ek/gdn-tape-native` for the duration of spec 020 — mlx-swift PR #25;
        # revert to `ref: alpha` once that merges.
        uses: actions/checkout@v6
        with:
          repository: ekryski/mlx-swift
          ref: ek/gdn-tape-native
          submodules: recursive
          path: mlx-swift

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          uname -a

      - name: Cache SwiftPM build artifacts
        uses: actions/cache@v5
        with:
          path: |
            mlx-swift-lm/.build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('mlx-swift-lm/Package.swift', 'mlx-swift-lm/Package.resolved', 'mlx-swift/Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve dependencies
        run: swift package resolve

      - name: Doctor check (fail fast on stale pin / drift)
        run: make doctor

      - name: Build (release, with tests + metallib install)
        # Use `make` (not `make spm`) so the metallib is compiled and copied
        # into the test bundle. `swift test --skip-build` then runs the
        # already-built tests without rebuilding (which would wipe the
        # metallib we just installed).
        run: make

      - name: Run unit tests (skip Benchmarks)
        run: swift test --skip-build -c release --skip Benchmarks

      - name: Upload xctest logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            mlx-swift-lm/.build/**/*.xctest/Contents/Resources/*.log
            ~/Library/Logs/DiagnosticReports/*
          retention-days: 7
